<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        img {
            width: 400px;
            height: auto;
            border: 3px solid #333;
            border-radius: 10px;
            margin-top: 20px;
        }

        p {
            color: #555;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h1>Welcome to My Web Page</h1>

    <p>This is an example of displaying a picture in an HTML page.</p>

    <img src="https://via.placeholder.com/400x250.png?text=Sample+Image" alt="Sample Image">

</body>
</html>
